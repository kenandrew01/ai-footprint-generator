<!DOCTYPE html>

<html>
<head>
    <title>AI Footprint Generator</title>
</head>
<body>
    <h1>Upload Datasheet</h1>

```
<input type="file" id="fileInput" />
<button onclick="uploadFile()">Generate Footprint</button>

<h2>Extracted Data:</h2>
<pre id="output"></pre>

<h2>Download:</h2>
<a id="downloadLink" href="#" download>Download Script</a>

<script>
    async function uploadFile() {
        const fileInput = document.getElementById("fileInput");
        const file = fileInput.files[0];

        const formData = new FormData();
        formData.append("file", file);

        const response = await fetch("http://127.0.0.1:8000/generate-footprint/", {
            method: "POST",
            body: formData
        });

        const result = await response.json();

        document.getElementById("output").textContent =
            JSON.stringify(result.data, null, 2);

        document.getElementById("downloadLink").href =
            "http://127.0.0.1:8000/download/" + result.script;
    }
</script>
```

</body>
</html>
